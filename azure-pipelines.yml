trigger:
 - main

pool: B17_AgentPool

stages:
  - stage: TerrafromPlan
    displayName: Terraform init validate plan
    jobs:
      - job: TerraformIVP
        pool: B17_AgentPool
        displayName: Terraform IVP
        steps:
          - task: TerraformInstaller@1
            displayName: Terraform install
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'xyz'
              backendAzureRmStorageAccountName: 'sanjaystg1'
              backendAzureRmContainerName: 'xyz'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            displayName: Terraform validate
            inputs:
              provider: 'azurerm'
              command: 'validate'
          - task: TerraformTask@5
            displayName: Terraform Plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: 'xyz'
          
          
          - task: tfsec@1
            continueOnError: true
            inputs:
              version: 'v1.26.0'
          # - task: PowerShell@2
          #   continueOnError: true
          #   inputs:
          #     targetType: 'inline'
          #     script: 'tflint --chdir=. --recursive'
          - task: InfracostSetup@2
            inputs:
              apiKey: 'ics_v1_B3xLBjiMffUU9aAy4v7nKs_p4OogRAhhyy4yKcP4j8hI1Q4RpMwg2W0mCk8tU0tUXP0Dn2wD'
              version: '0.10.x'
          - task: PowerShell@2
            inputs:
              targetType: 'inline'
              script: 'infracost breakdown --path=. --format=table'
              
      - job: manualValidation
        pool: server
        displayName: Valdation
        dependsOn: TerraformIVP
        steps:
           - task: ManualValidation@1
             inputs:
               notifyUsers: 'cloud.sanjaysingh@gmail.com'
               approvers: 'cloud.sanjaysingh@gmail.com'
  - stage: TerrafromApply
    displayName: Terraform Apply
    jobs:
      - job: TerraformA
        pool: B17_AgentPool
        displayName: Terraform A
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'xyz'
              backendAzureRmStorageAccountName: 'sanjaystg1'
              backendAzureRmContainerName: 'xyz'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            displayName: Terraform apply
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'xyz'

