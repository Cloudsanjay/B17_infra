trigger:
 branches:
  include:
    - main

pool: B17_AgentPool

stages:
  - stage: TerrafromPlan
    displayName: Terraform init validate plan
    jobs:
      - job: TerraformIVP
        pool: B17_AgentPool
        displayName: Terraform IVP
        steps:
          - task: TerraformInstaller@1
            displayName: Terraform install
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'xyz'
              backendAzureRmStorageAccountName: 'sanjaystg1'
              backendAzureRmContainerName: 'xyz'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            displayName: Terraform validate
            inputs:
              provider: 'azurerm'
              command: 'validate'
          - task: TerraformTask@5
            displayName: Terraform Plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: 'xyz'
      - job: manualValidation
        pool: server
        displayName: Valdation
        dependsOn: TerraformIVP
        steps:
           - task: ManualValidation@1
             inputs:
               notifyUsers: 'cloud.sanjaysingh@gmail.com'
               approvers: 'cloud.sanjaysingh@gmail.com'
  - stage: TerrafromApply
    displayName: Terraform Apply
    jobs:
      - job: TerraformA
        pool: B17_AgentPool
        displayName: Terraform A
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'xyz'
              backendAzureRmStorageAccountName: 'sanjaystg1'
              backendAzureRmContainerName: 'xyz'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            displayName: Terraform apply
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'xyz'

