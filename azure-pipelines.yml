trigger: none

pool: B17_AgentPool

stages:
  - stage: TerrafromPlan
    displayName: Terraform init validate plan
    jobs:
      - job: TerraformIVP
        displayName: Terraform IVP
        steps:
          - task: TerraformInstaller@1
            displayName: Terraform install
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'xyz'
              backendAzureRmStorageAccountName: 'sanjaystg1'
              backendAzureRmContainerName: 'xyz'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            displayName: Terraform validate
            inputs:
              provider: 'azurerm'
              command: 'validate'
          - task: TerraformTask@5
            displayName: Terraform Plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: 'xyz'
  - stage: TerrafromApply
    displayName: Terraform Apply
    jobs:
      - job: TerraformA
        displayName: Terraform A
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'xyz'
              backendAzureRmStorageAccountName: 'sanjaystg1'
              backendAzureRmContainerName: 'xyz'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            displayName: Terraform apply
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'xyz'

